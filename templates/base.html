<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureMind AI - {% block title %}Dashboard{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-shield-halved text-accent"></i>
            <span>SecureMind AI</span>
        </div>
        <ul class="nav flex-column mt-4">
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
            </li>
            <li class="nav-item mt-3">
                <span class="nav-category">AI Modules</span>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/phishing' %}active{% endif %}" href="/phishing">
                    <i class="fa-solid fa-envelope-open-text"></i> Phishing Detection
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/ids' %}active{% endif %}" href="/ids">
                    <i class="fa-solid fa-network-wired"></i> Intrusion Detection
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <header class="topbar d-flex justify-content-between align-items-center mb-4">
            <h4 class="m-0 fw-bold">{% block page_heading %}Dashboard{% endblock %}</h4>
            <div class="user-profile">
                <span class="badge bg-secondary-accent px-3 py-2 badge-glass">
                    <i class="fa-solid fa-circle text-success me-2" style="font-size: 8px;"></i> System Optimal
                </span>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
